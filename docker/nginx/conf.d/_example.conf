# ── Template pour un nouveau projet ──────────────────────────────────────────
# Pour ajouter un projet, utilisez le script automatique :
#
#   sudo ./scripts/add-project.sh <domaine> <conteneur:port>
#   Exemple : sudo ./scripts/add-project.sh monapp.example.com monapp:3000
#
# Ou copiez ce fichier manuellement :
#   cp _example.conf monprojet.conf
#   sed -i 's/MON_DOMAINE/monprojet.example.com/g' monprojet.conf
#   sed -i 's/MON_CONTENEUR/monprojet/g; s/MON_PORT/3000/g' monprojet.conf
#
# Puis rechargez nginx :
#   docker exec nginx nginx -s reload
# ─────────────────────────────────────────────────────────────────────────────

