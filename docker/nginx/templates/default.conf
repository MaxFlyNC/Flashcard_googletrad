# ── FlashCardTrad — Reverse Proxy ────────────────────────────────────────────
# Ce fichier est traité par envsubst au démarrage du conteneur nginx.
# La variable ${DOMAIN} est remplacée par la valeur définie dans .env
# ─────────────────────────────────────────────────────────────────────────────

# HTTP → redirection HTTPS (sauf challenge ACME)
server {
    listen 80;
    server_name ${DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — FlashCardTrad
server {
    listen 443 ssl http2;
    server_name ${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    # ── API Backend (Express + SQLite) ────────────────────────────────────
    location /api/ {
        proxy_pass       http://flashcardtrad-api:4000/api/;
        include          /etc/nginx/snippets/proxy-params.conf;
    }

    # ── Application React (PWA) ───────────────────────────────────────────
    location / {
        proxy_pass       http://flashcardtrad:80;
        include          /etc/nginx/snippets/proxy-params.conf;
    }

    # ── n8n workflows (WebSocket requis) ─────────────────────────────────
    location /n8n/ {
        proxy_pass         http://n8n:5678/;
        include            /etc/nginx/snippets/proxy-params.conf;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
