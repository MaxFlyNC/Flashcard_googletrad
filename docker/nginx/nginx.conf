# ── Nginx — Configuration principale multi-projets ───────────────────────────
# Charge automatiquement :
#   /etc/nginx/conf.d/*.conf     → projets générés par envsubst (FlashCardTrad)
#   /etc/nginx/projects.d/*.conf → projets supplémentaires (statiques)
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    server_tokens  off;

    gzip  on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ── FlashCardTrad (généré par envsubst depuis templates/) ─────────────────
    include /etc/nginx/conf.d/*.conf;

    # ── Projets supplémentaires (fichiers statiques dans conf.d/) ────────────
    include /etc/nginx/projects.d/*.conf;
}
