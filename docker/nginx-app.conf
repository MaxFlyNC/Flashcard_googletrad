# Config Nginx interne du conteneur FlashCardTrad
# Sert les fichiers statiques du build React (SPA)

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # React Router — toutes les routes renvoient index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long terme pour les assets hachés (JS/CSS/images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service Worker — ne pas mettre en cache
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
}
